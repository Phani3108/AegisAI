replicaCount: 2

image:
  repository: aegisai
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

env:
  AEGISAI_OLLAMA_BASE_URL: "http://ollama:11434"
  AEGISAI_CHROMA_PERSIST_DIR: "/data/chroma"

extraEnv: []

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi

podSecurityContext:
  fsGroup: 10001

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1
