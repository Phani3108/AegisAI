apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegisai.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "aegisai.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aegisai.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aegisai.name" . }}
    spec:
      containers:
        - name: aegisai
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: chroma
              mountPath: /data/chroma
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: chroma
          persistentVolumeClaim:
            claimName: {{ include "aegisai.fullname" . }}-chroma
      {{- end }}
